<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIXION STREAM HUB</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://player.twitch.tv/js/embed/v1.js"></script>
</head>

<body class="bg-black text-white min-h-screen">

    <!-- HEADER -->
    <header class="border-b border-gray-800">
        <div class="container mx-auto flex flex-col md:flex-row items-center justify-around p-5">

            <div class="w-64">
                <img src="vixxion.png" alt="Logo" class="w-full h-600 object-contain">
            </div>

            <nav class="flex flex-wrap gap-6">
                <a href="https://chat.openai.com" class="hover:text-black-400 text-4xl px-4 py-2 rounded-full hover:bg-yellow-400 hover:text-black transition duration-300">GPT</a>
                <a href="https://neuquen.weebly.com" class="hover:text-black-400 text-4xl px-4 py-2 rounded-full hover:bg-yellow-400 hover:text-black transition duration-300">NEUQUEN</a>
                <a href="https://argentina-deportes.vercel.app/" class="hover:text-black-400 text-4xl px-4 py-2 rounded-full hover:bg-yellow-400 hover:text-black transition duration-300">ARG DEPORTES</a>
                <a href="https://intro-jef-tech.vercel.app/" class="hover:text-black-400 text-4xl px-4 py-2 rounded-full hover:bg-yellow-400 hover:text-black transition duration-300">JEF TECH</a>
            </nav>
        </div>
    </header>

    <!-- MAIN -->
    <main class="container mx-auto p-6">

        <h1 class="text-4xl font-bold text-center mb-10">
            CARGA LOS NOMBRES DE TUS CANALES FAVORITOS
        </h1>

        <div class="grid md:grid-cols-3 gap-8" id="streams-container">
            <!-- Se generan automáticamente -->
        </div>

    </main>

    <!-- FOOTER -->
    <footer class="border-t border-gray-800 mt-10">
        <div class="text-center p-6">
            <p class="text-gray-400">
                © 2026 VIXION STREAM HUB
            </p>
        </div>
    </footer>


    <script>
        const defaultChannels = [
            "murloc_cg",
            "pablotropellado",
            "nicro4fun",
            "paache_",
            "urbanroosters",
            "electrofusio"
        ];

        const container = document.getElementById("streams-container");

        function createStreamBox(index, defaultChannel) {
            const box = document.createElement("div");

            box.innerHTML = `
                <div class="bg-gray-900 rounded-lg p-4">
                    
                    <div class="flex gap-2 mb-4">
                        <input 
                            id="input${index}"
                            type="text"
                            placeholder="Canal Twitch"
                            class="flex-1 px-3 py-2 rounded text-black"
                        />

                        <button 
                            onclick="loadChannel(${index})"
                            class="bg-red-500 hover:bg-red-600 px-4 rounded"
                        >
                            Cargar
                        </button>
                    </div>

                    <div 
                        id="stream${index}" 
                        class="h-[400px] rounded overflow-hidden">
                    </div>

                </div>
            `;

            container.appendChild(box);

            new Twitch.Player(`stream${index}`, {
                width: "100%",
                height: "100%",
                channel: defaultChannel,
                autoplay: false
            });
        }

        function loadChannel(index) {
            const input = document.getElementById(`input${index}`);
            const channel = input.value.trim();

            if (!channel) {
                alert("Ingresá un canal");
                return;
            }

            document.getElementById(`stream${index}`).innerHTML = "";

            new Twitch.Player(`stream${index}`, {
                width: "100%",
                height: "100%",
                channel: channel,
                autoplay: true
            });
        }

        defaultChannels.forEach((channel, index) => {
            createStreamBox(index + 1, channel);
        });
    </script>

</body>
</html>
